<!DOCTYPE html>
<html>
<head>
<title>GAMING BOX 71</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
margin:0;
background:#0d0d0d;
color:white;
font-family:Arial,sans-serif;
}
header{
background:#111;
padding:15px;
text-align:center;
font-size:28px;
font-weight:bold;
color:#00e5ff;
}
.banner{
padding:40px 20px;
text-align:center;
background:linear-gradient(45deg,#0066ff,#ff0000);
}
.banner h1{
margin:0;
font-size:35px;
}
.games{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
padding:20px;
}
.card{
background:#1b1b1b;
padding:15px;
border-radius:10px;
text-align:center;
}
.card button{
background:#00e5ff;
border:none;
padding:10px;
border-radius:5px;
font-weight:bold;
}
footer{
text-align:center;
padding:20px;
background:#111;
}
</style>
</head>
<body>

<header>
🎮 GAMING BOX 71
</header>

<div class="banner">
<h1>Welcome Gamers!</h1>
<p>Your Ultimate Gaming Hub</p>
</div>

<div class="games">

<div class="card">
<h3>Game 1</h3>
<p>Coming Soon</p>
<button>Download</button>
</div>

<div class="card">
<h3>Game 2</h3>
<p>Coming Soon</p>
<button>Download</button>
</div>

<div class="card">
<h3>Game 3</h3>
<p>Coming Soon</p>
<button>Download</button>
</div>

</div>

<footer>
© 2026 GAMING BOX 71
</footer>

</body>
</html>
